version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8001:8001"
    environment:
      - JWT_SECRET=dev_secret_key_12345
      - JWT_EXPIRE_HOURS=168
      - FREE_LIMIT=5
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "5236:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped