<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务暂时不可用 - ResumeAI</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 60px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            color: #666;
            margin: 20px 0;
        }
        .error-desc {
            font-size: 16px;
            color: #999;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.3s;
            margin-right: 10px;
        }
        .btn-home:hover {
            background: #333;
        }
        .btn-refresh {
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn-refresh:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code">服务异常</div>
        <div class="error-message">服务暂时不可用</div>
        <div class="error-desc">系统正在维护或遇到临时问题，请稍后再试</div>
        <a href="/" class="btn-home">返回首页</a>
        <a href="javascript:location.reload()" class="btn-refresh">刷新页面</a>
    </div>
</body>
</html>
