services:
  - type: web
    name: resume-ai-api
    runtime: python
    region: singapore
    autoDeploy: true  # 自动检测GitHub推送并部署
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        value: resumeai_jwt_secret_key_2026
      - key: JWT_EXPIRE_HOURS
        value: "168"
      - key: FREE_LIMIT
        value: "5"
      - key: DASHSCOPE_API_KEY
        value: sk-sp-e8d1076e8dd4461d8d1edf2542f8de68
      - key: PYTHON_VERSION
        value: "3.12"